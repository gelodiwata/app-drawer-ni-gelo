                const contentHTML = `<div class="calc-container"><div class="calc-display">0</div><div class="calc-buttons"><button class="calc-btn clear">C</button><button class="calc-btn">(</button><button class="calc-btn">)</button><button class="calc-btn op">/</button><button class="calc-btn">7</button><button class="calc-btn">8</button><button class="calc-btn">9</button><button class="calc-btn op">*</button><button class="calc-btn">4</button><button class="calc-btn">5</button><button class="calc-btn">6</button><button class="calc-btn op">-</button><button class="calc-btn">1</button><button class="calc-btn">2</button><button class="calc-btn">3</button><button class="calc-btn op">+</button><button class="calc-btn" style="grid-column:span 2;">0</button><button class="calc-btn">.</button><button class="calc-btn equals">=</button></div></div>`;
                const pid = ProcessManager.register('calculator', 'application');
                const winId = WindowManager.createWindow(title, contentHTML, {
                    width: 300,
                    height: 380,
                    appType: 'calculator',
                    pid
                });
                const proc = ProcessManager.processes.find(p => p.pid === pid);
                if (proc) proc.windowId = winId;
                setTimeout(() => setupCalculatorEvents(winId), 100);
                return winId;
            }

            function setupCalculatorEvents(windowId) {
                const winData = WindowManager.getWindowById(windowId);
                if (!winData) return;
                const display = winData.el.querySelector('.calc-display');
                if (!display) return;
                let current = '0',
                    expr = '',
                    reset = false;
                const update = () => display.textContent = current;
                winData.el.querySelectorAll('.calc-btn').forEach(btn => btn.addEventListener('click', () => {
                    const v = btn.textContent;
                    if (v === 'C') {
                        current = '0';
                        expr = '';
                        reset = false;
                    } else if (v === '=') {
                        try {
                            const r = Function('"use strict"; return (' + (expr + current) + ')')();
                            current = String(r);
                            expr = '';
                            reset = true;
                        } catch {
                            current = 'Error';
                        }
                    } else if (['+', '-', '*', '/'].includes(v)) {
                        expr += current + v;
                        current = '0';
                        reset = false;
                    } else if (v === '(' || v === ')') {
                        if (reset) {
                            expr = '';
                            current = v;
                            reset = false;
                        } else current = current === '0' ? v : current + v;
                    } else {
                        if (reset) {
                            current = v;
                            reset = false;
                        } else current = current === '0' && v !== '.' ? v : current + v;
                    }
                    update();
                }));
            }

            function launchFileExplorer(options = {}) {
                const title = options.title || '📁 File Explorer';
                const startPath = options.startPath || '/home/user';
                const contentHTML = `<div class="explorer-container"><div class="explorer-nav"><button class="explorer-back">← Back</button><button class="explorer-up">↑ Up</button><button class="explorer-home">⌂ Home</button><span class="explorer-path">${startPath}</span></div><div class="explorer-list"></div></div>`;
                const pid = ProcessManager.register('file-explorer', 'application');
                const winId = WindowManager.createWindow(title, contentHTML, {
                    width: 500,
                    height: 400,
                    appType: 'file-explorer',
                    pid
                });
                const proc = ProcessManager.processes.find(p => p.pid === pid);
                if (proc) proc.windowId = winId;
                setTimeout(() => setupExplorerEvents(winId, startPath), 100);
                return winId;
            }

            function setupExplorerEvents(windowId, initialPath) {
                const winData = WindowManager.getWindowById(windowId);
                if (!winData) return;
                const pathSpan = winData.el.querySelector('.explorer-path');
                const listEl = winData.el.querySelector('.explorer-list');
                let currentPath = initialPath,
                    history = [currentPath],
                    pos = 0;

                function navigate(path) {
                    currentPath = path;
                    if (pos < history.length - 1) history = history.slice(0, pos + 1);
                    history.push(path);
                    pos = history.length - 1;
                    render();
                    PersistenceManager.scheduleSave();
                }

                function render() {
                    pathSpan.textContent = currentPath;
                    const listing = FileSystem.listDir(currentPath);
                    listEl.innerHTML = '';
                    if (!listing || !listing.length) {
                        listEl.innerHTML = '<div class="explorer-empty">Empty directory</div>';
                        return;
                    }
                    listing.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'explorer-item';
                        div.innerHTML = `<span class="ex-icon">${item.type==='dir'?'📁':'📄'}</span><span>${item.name}</span>`;
                        div.addEventListener('dblclick', () => {
                            const newPath = currentPath === '/' ? '/' + item.name : currentPath + '/' + item.name;
                            if (item.type === 'dir') navigate(newPath);
                            else {
                                const edId = launchTextEditor({
                                    filePath: newPath,
                                    title: '📝 ' + item.name
                                });
                                setTimeout(() => openFileInEditor(edId, newPath), 300);
                            }
                        });
                        listEl.appendChild(div);
                    });
                }
                winData.el.querySelector('.explorer-back').addEventListener('click', () => {
                    if (pos > 0) {
                        pos--;
                        currentPath = history[pos];
                        render();
                    }
                });
                winData.el.querySelector('.explorer-up').addEventListener('click', () => {
                    if (currentPath !== '/') navigate(FileSystem.getParentPath(currentPath));
                });
                winData.el.querySelector('.explorer-home').addEventListener('click', () => navigate('/home/user'));
                render();
            }

            function launchSystemMonitor(options = {}) {
                const title = options.title || '📊 System Monitor';
                const contentHTML = `<div class="sysmon-container"><h3>System Monitor</h3><p>CPU: <span id="sysmon-cpu">0%</span></p><div class="sysmon-bar"><div class="sysmon-bar-fill" style="width:5%;"></div></div><p>Memory: <span id="sysmon-mem">0 MB</span></p><div class="sysmon-bar"><div class="sysmon-bar-fill" style="width:15%;"></div></div><p>Uptime: <span id="sysmon-uptime">0s</span></p><p>Processes: <span id="sysmon-procs">0</span></p><p>Windows: <span id="sysmon-wins">0</span></p></div>`;
                const pid = ProcessManager.register('system-monitor', 'application');
                const winId = WindowManager.createWindow(title, contentHTML, {
                    width: 380,
                    height: 320,
                    appType: 'system-monitor',
                    pid
                });
                ProcessManager.processes.find(p => p.pid === pid).windowId = winId;
                const interval = setInterval(() => {
                    const wd = WindowManager.getWindowById(winId);
                    if (!wd.el.parentNode) {
                        clearInterval(interval);
                        return;
                    }
                    wd.el.querySelector('#sysmon-cpu').textContent = (Math.floor(Math.random() * 25) + 2) + '%';
                    wd.el.querySelector('#sysmon-mem').textContent = `${Math.round(performance.memory?.usedJSHeapSize/1048576)||800} MB`;
                    wd.el.querySelector('#sysmon-uptime').textContent = Kernel.getUptimeString();
                    wd.el.querySelector('#sysmon-procs').textContent = ProcessManager.list().length;
                    wd.el.querySelector('#sysmon-wins').textContent = WindowManager.windows.size;
                }, 1500);
                return winId;
            }

            function showNotification(msg) {
                const area = document.getElementById('notification-area');
                const notif = document.createElement('div');
                notif.className = 'notification';
                notif.textContent = msg;
                area.appendChild(notif);
                setTimeout(() => {
                    if (notif.parentNode) notif.parentNode.removeChild(notif);
                }, 3000);
            }

            // ==================== PERSISTENCE MANAGER ====================
            const PersistenceManager = {
                STORAGE_KEY: 'webos_state',
                saveTimer: null,
                isLoading: false,

                scheduleSave() {
                    if (this.isLoading) return;
                    clearTimeout(this.saveTimer);
                    this.saveTimer = setTimeout(() => this.saveState(), 300);
                },
                saveNow() {
                    clearTimeout(this.saveTimer);
                    this.saveState();
                },
                saveState() {
                    if (this.isLoading) return;
                    try {
                        const state = {
                            filesystem: this.serializeFS(FileSystem.root),
                            windows: [],
                            terminalStates: {},
                            editorStates: {},
                            focusedWindowId: WindowManager.focusedWindowId,
                            windowCounter: WindowManager.windowCounter,
                            zIndexBase: WindowManager.zIndexBase,
                            pidCounter: Kernel.pidCounter,
                        };
                        for (const [id, winData] of WindowManager.windows) {
                            const ws = {
                                id,
                                title: winData.title,
                                appType: winData.appType,
                                x: winData.x,
                                y: winData.y,
                                width: winData.width,
                                height: winData.height,
                                minimized: winData.minimized,
                                maximized: winData.maximized,
                                pid: winData.pid,
                            };
                            if (winData.appType === 'terminal' && terminalStates.has(id)) {
                                const ts = terminalStates.get(id);
                                ws.terminalState = {
                                    currentDir: ts.currentDir,
                                    history: ts.history,
                                    historyIndex: ts.historyIndex,
                                    outputLines: ts.outputLines
                                };
                            }
                            if (winData.appType === 'text-editor' && editorStates.has(id)) {
                                const es = editorStates.get(id);
                                ws.editorState = {
                                    filePath: es.filePath,
                                    content: es.content,
                                    modified: es.modified
                                };
                            }
                            if (winData.appType === 'file-explorer') {
                                const pathSpan = winData.el.querySelector('.explorer-path');
                                if (pathSpan) ws.explorerPath = pathSpan.textContent;
                            }
                            state.windows.push(ws);
                        }
                        localStorage.setItem(this.STORAGE_KEY, JSON.stringify(state));
                    } catch (e) {
                        console.warn('Failed to save state:', e);
                    }
                },

                serializeFS(node) {
                    if (!node) return null;
                    const obj = {
                        type: node.type,
                        name: node.name,
                        createdAt: node.createdAt
                    };
                    if (node.type === 'file') {
                        obj.content = node.content;
                        obj.size = node.size;
                        obj.modifiedAt = node.modifiedAt;
                    } else if (node.type === 'dir') {
                        obj.children = {};
                        for (const [name, child] of Object.entries(node.children)) {
                            obj.children[name] = this.serializeFS(child);
                        }
                    }
                    return obj;
                },

                deserializeFS(obj, parent = null) {
                    if (!obj) return null;
                    const node = {
                        type: obj.type,
                        name: obj.name,
                        parent,
                        createdAt: obj.createdAt
                    };
                    if (obj.type === 'file') {
                        node.content = obj.content;
                        node.size = obj.size;
                        node.modifiedAt = obj.modifiedAt;
                    } else if (obj.type === 'dir') {
                        node.children = {};
                        for (const [name, childObj] of Object.entries(obj.children || {})) {
                            node.children[name] = this.deserializeFS(childObj, node);
                        }
                    }
                    return node;
                },

                loadState() {
                    try {
                        const json = localStorage.getItem(this.STORAGE_KEY);
                        if (!json) return false;
                        const state = JSON.parse(json);
                        this.isLoading = true;

                        if (state.filesystem) {
                            FileSystem.root = this.deserializeFS(state.filesystem, null);
                        }

                        Kernel.pidCounter = state.pidCounter || 1;
                        WindowManager.windowCounter = state.windowCounter || 0;
                        WindowManager.zIndexBase = state.zIndexBase || 100;

                        const windowsToRestore = state.windows || [];
                        windowsToRestore.forEach(ws => {
                            const opts = {
                                id: ws.id,
                                width: ws.width,
                                height: ws.height,
                                x: ws.x,
                                y: ws.y,
                                appType: ws.appType,
                                pid: ws.pid,
                                skipAnimation: true,
                                title: ws.title
                            };
                            let winId;
                            switch (ws.appType) {
                                case 'terminal':
                                    winId = launchTerminalPersist(opts, ws.terminalState);
                                    break;
                                case 'text-editor':
                                    winId = launchTextEditorPersist(opts, ws.editorState);
                                    break;
                                case 'file-explorer':
                                    winId = launchFileExplorerPersist(opts, ws.explorerPath);
                                    break;
                                case 'calculator':
                                    winId = launchCalculatorPersist(opts);
                                    break;
                                case 'system-monitor':
                                    winId = launchSystemMonitorPersist(opts);
                                    break;
                                default:
                                    winId = WindowManager.createWindow(ws.title, '<div>App</div>', opts);
                            }
                            if (winId) {
                                const wd = WindowManager.windows.get(winId);
                                if (wd) {
                                    if (ws.minimized) WindowManager.minimizeWindow(winId);
                                    if (ws.maximized) {
                                        wd.prevBounds = {
                                            x: ws.x,
                                            y: ws.y,
                                            width: ws.width,
                                            height: ws.height
                                        };
                                        WindowManager.toggleMaximize(winId);
                                    }
                                }
                            }
                        });

                        if (state.focusedWindowId && WindowManager.windows.has(state.focusedWindowId)) {
                            WindowManager.focusWindow(state.focusedWindowId);
                        }

                        this.isLoading = false;
                        return true;
                    } catch (e) {
                        console.error('Failed to load state:', e);
                        this.isLoading = false;
                        return false;
                    }
                }
            };

            // ---- Persistent launchers (reuse the same window HTML but restore state) ----
            function launchTerminalPersist(opts, termState) {
                const title = opts.title || '💻 Terminal';
                const contentHTML = `<div class="terminal-container"><div class="terminal-output"></div><div class="terminal-input-line"><span class="terminal-prompt">$</span><input type="text" class="terminal-input" spellcheck="false" autocomplete="off"></div></div>`;
                const pid = opts.pid || ProcessManager.register('terminal', 'application');
                const winId = WindowManager.createWindow(title, contentHTML, {...opts,
                    pid,
                    appType: 'terminal'
                });
                ProcessManager.processes.find(p => p.pid === pid).windowId = winId;

                if (termState) {
                    const state = getTerminalState(winId);
                    state.currentDir = termState.currentDir || '/home/user';
                    state.history = termState.history || [];
                    state.historyIndex = (termState.historyIndex) || -1;
                    state.outputLines = termState.outputLines || [];
                }

                setTimeout(() => {
                    const winData = WindowManager.getWindowById(winId);
                    if (!winData) return;
                    const promptSpan = winData.el.querySelector('.terminal-prompt');
                    const state = getTerminalState(winId);
                    if (promptSpan) promptSpan.textContent = `${Kernel.user}@${Kernel.hostname}:${state.currentDir}$ `;
                    const outputEl = winData.el.querySelector('.terminal-output');
                    if (outputEl && state.outputLines.length) {
                        outputEl.innerHTML = '';
                        state.outputLines.forEach(line => {
                            const div = document.createElement('div');
                            div.className = line.className || '';
                            div.textContent = line.text;
                            outputEl.appendChild(div);
                        });
                        outputEl.scrollTop = outputEl.scrollHeight;
                    }
                    if (!state.outputLines.length) appendTerminalPrompt(winId);
                    setupTerminalEvents(winId);
                }, 150);
                return winId;
            }

            function launchTextEditorPersist(opts, editorState) {
                const title = opts.title || '📝 Text Editor';
                const contentHTML = `<div class="editor-container"><textarea class="editor-textarea"></textarea><div class="editor-statusbar">Untitled | Lines: 0 | Chars: 0</div></div>`;
                const pid = opts.pid || ProcessManager.register('text-editor', 'application');
                const winId = WindowManager.createWindow(title, contentHTML, {...opts,
                    pid,
                    appType: 'text-editor'
                });
                ProcessManager.processes.find(p => p.pid === pid).windowId = winId;
                if (editorState) {
                    const es = getEditorState(winId);
                    es.filePath = editorState.filePath || null;
                    es.content = editorState.content || '';
                    es.modified = editorState.modified || false;
                }
                setTimeout(() => {
                    const winData = WindowManager.getWindowById(winId);
                    if (winData) {
                        const textarea = winData.el.querySelector('.editor-textarea');
                        const es = getEditorState(winId);
                        if (textarea) textarea.value = es.content;
                        updateEditorStatus(winId);
                        if (es.filePath) {
                            const titleEl = winData.el.querySelector('.window-title');
                            if (titleEl) titleEl.textContent = '📝 ' + es.filePath.split('/').pop();
                        }
                    }
                    setupEditorEvents(winId);
                }, 150);
                return winId;
            }

            function launchFileExplorerPersist(opts, explorerPath) {
                const path = explorerPath || '/home/user';
                const title = opts.title || '📁 File Explorer';
                const contentHTML = `<div class="explorer-container"><div class="explorer-nav"><button class="explorer-back">← Back</button><button class="explorer-up">↑ Up</button><button class="explorer-home">⌂ Home</button><span class="explorer-path">${path}</span></div><div class="explorer-list"></div></div>`;
                const pid = opts.pid || ProcessManager.register('file-explorer', 'application');
                const winId = WindowManager.createWindow(title, contentHTML, {...opts,
                    pid,
                    appType: 'file-explorer'
                });
                ProcessManager.processes.find(p => p.pid === pid).windowId = winId;
                setTimeout(() => setupExplorerEvents(winId, path), 150);
                return winId;
            }

            function launchCalculatorPersist(opts) {
                const title = opts.title || '🔢 Calculator';
                const contentHTML = `<div class="calc-container"><div class="calc-display">0</div><div class="calc-buttons"><button class="calc-btn clear">C</button><button class="calc-btn">(</button><button class="calc-btn">)</button><button class="calc-btn op">/</button><button class="calc-btn">7</button><button class="calc-btn">8</button><button class="calc-btn">9</button><button class="calc-btn op">*</button><button class="calc-btn">4</button><button class="calc-btn">5</button><button class="calc-btn">6</button><button class="calc-btn op">-</button><button class="calc-btn">1</button><button class="calc-btn">2</button><button class="calc-btn">3</button><button class="calc-btn op">+</button><button class="calc-btn" style="grid-column:span 2;">0</button><button class="calc-btn">.</button><button class="calc-btn equals">=</button></div></div>`;
                const pid = opts.pid || ProcessManager.register('calculator', 'application');
                const winId = WindowManager.createWindow(title, contentHTML, {...opts,
                    pid,
                    appType: 'calculator'
                });
                ProcessManager.processes.find(p => p.pid === pid).windowId = winId;
                setTimeout(() => setupCalculatorEvents(winId), 150);
                return winId;
            }

            function launchSystemMonitorPersist(opts) {
                const title = opts.title || '📊 System Monitor';
                const contentHTML = `<div class="sysmon-container"><h3>System Monitor</h3><p>CPU: <span id="sysmon-cpu">0%</span></p><div class="sysmon-bar"><div class="sysmon-bar-fill" style="width:5%;"></div></div><p>Memory: <span id="sysmon-mem">0 MB</span></p><div class="sysmon-bar"><div class="sysmon-bar-fill" style="width:15%;"></div></div><p>Uptime: <span id="sysmon-uptime">0s</span></p><p>Processes: <span id="sysmon-procs">0</span></p><p>Windows: <span id="sysmon-wins">0</span></p></div>`;
                const pid = opts.pid || ProcessManager.register('system-monitor', 'application');
                const winId = WindowManager.createWindow(title, contentHTML, {...opts,
                    pid,
                    appType: 'system-monitor'
                });
                ProcessManager.processes.find(p => p.pid === pid).windowId = winId;
                const interval = setInterval(() => {
                    const wd = WindowManager.getWindowById(winId);
                    if (!wd.el.parentNode) {
                        clearInterval(interval);
                        return;
                    }
                    wd.el.querySelector('#sysmon-cpu').textContent = (Math.floor(Math.random() * 25) + 2) + '%';
                    wd.el.querySelector('#sysmon-mem').textContent = `${Math.round(performance.memory?.usedJSHeapSize/1048576)||800} MB`;
                    wd.el.querySelector('#sysmon-uptime').textContent = Kernel.getUptimeString();
                    wd.el.querySelector('#sysmon-procs').textContent = ProcessManager.list().length;
                    wd.el.querySelector('#sysmon-wins').textContent = WindowManager.windows.size;
                }, 1500);
                return winId;
            }

            // ==================== BOOT & GLOBAL ====================
            function runBootSequence() {
                const bootScreen = document.getElementById('boot-screen');
                const bootLog = document.getElementById('boot-log');
                const bootLogo = document.getElementById('boot-logo');
                const bootProgress = document.getElementById('boot-progress');
                const bootProgressBar = document.getElementById('boot-progress-bar');

                const logLines = [
                    '[BIOS] Initializing hardware...',
                    '[BIOS] CPU: WebOS Virtual Processor @ 3.2GHz',
                    '[BIOS] Memory: 8192MB OK',
                    '[BIOS] Storage: Virtual Disk 64GB detected',
                    '[BIOS] Boot device: vda0',
                    '',
                    '[KERNEL] Loading WebOS kernel...',
                    '[KERNEL] Version 1.0.0 (browser-build)',
                    '[KERNEL] Initializing process scheduler...',
                    '[KERNEL] Setting up virtual memory...',
                    '[KERNEL] Initializing filesystem driver...',
                    '[KERNEL] Mounting root filesystem...',
                    '[KERNEL] Mounting /tmp (tmpfs)...',
                    '[KERNEL] Filesystem check: clean',
                    '',
                    '[INIT] Starting system services...',
                    '[INIT] Starting window manager...',
                    '[INIT] Starting shell service...',
                    '[INIT] System ready.',
                ];

                let lineIndex = 0;
                const typeInterval = setInterval(() => {
                    if (lineIndex < logLines.length) {
                        bootLog.textContent += logLines[lineIndex] + '\n';
                        bootLog.scrollTop = bootLog.scrollHeight;
                        lineIndex++;
                    } else {
                        clearInterval(typeInterval);
                        bootLogo.classList.add('visible');
                        bootProgress.classList.add('visible');
                        setTimeout(() => bootProgressBar.style.width = '100%', 200);
                        setTimeout(() => {
                            bootScreen.classList.add('fade-out');
                            showDesktop();
                        }, 1200);
                    }
                }, 60);
            }

            function showDesktop() {
                document.getElementById('desktop').style.display = 'block';
                document.getElementById('taskbar').style.display = 'flex';
                document.getElementById('boot-screen').style.display = 'none';
                updateClock();
                setInterval(updateClock, 1000);

                const restored = PersistenceManager.loadState();
                if (!restored) {
                    launchTerminal(); // fresh start
                }
                showNotification('WebOS ready. All data saved in browser.');
            }

            function updateClock() {
                document.getElementById('taskbar-clock').textContent = new Date().toLocaleTimeString([], {
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }

            function setupGlobalEvents() {
                const startBtn = document.getElementById('start-btn');
                const startMenu = document.getElementById('start-menu');
                startBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const isOpen = startMenu.classList.contains('open');
                    if (isOpen) {
                        startMenu.classList.remove('open');
                        startBtn.classList.remove('active');
                    } else {
                        startMenu.classList.add('open');
                        startBtn.classList.add('active');
                    }
                });
                document.addEventListener('click', (e) => {
                    if (!startMenu.contains(e.target) && e.target !== startBtn) {
                        startMenu.classList.remove('open');
                        startBtn.classList.remove('active');
                    }
                });
                startMenu.querySelectorAll('.menu-item[data-app]').forEach(item => {
                    item.addEventListener('click', () => {
                        launchApp(item.dataset.app);
                        startMenu.classList.remove('open');
                        startBtn.classList.remove('active');
                    });
                });
                document.getElementById('menu-shutdown').addEventListener('click', () => {
                    startMenu.classList.remove('open');
                    startBtn.classList.remove('active');
                    PersistenceManager.saveNow();
                    showNotification('Shutting down...');
                    setTimeout(() => location.reload(), 600);
                });
                document.querySelectorAll('.desktop-icon').forEach(icon => {
                    icon.addEventListener('dblclick', () => launchApp(icon.dataset.app));
                    icon.addEventListener('click', () => {
                        document.querySelectorAll('.desktop-icon').forEach(i => {
                            i.style.background = '';
                            i.style.borderColor = 'transparent';
                        });
                        icon.style.background = 'rgba(255,255,255,0.08)';
                        icon.style.borderColor = 'rgba(255,255,255,0.2)';
                    });
                });
                document.getElementById('desktop').addEventListener('click', (e) => {
                    if (e.target === document.getElementById('desktop') || e.target.id === 'desktop-icons') {
                        document.querySelectorAll('.desktop-icon').forEach(i => {
                            i.style.background = '';
                            i.style.borderColor = 'transparent';
                        });
                    }
                });
                document.addEventListener('keydown', (e) => {
                    if (e.ctrlKey && e.key === 't') {
                        e.preventDefault();
                        launchTerminal();
                    }
                    if (e.ctrlKey && e.key === 'n') {
                        e.preventDefault();
                        launchTextEditor();
                    }
                    if (e.ctrlKey && e.key === 'e') {
                        e.preventDefault();
                        launchFileExplorer();
                    }
                });
                window.addEventListener('beforeunload', () => PersistenceManager.saveNow());
            }

            function init() {
                Kernel.init();
                if (!localStorage.getItem(PersistenceManager.STORAGE_KEY)) {
                    FileSystem.init(true);
                } else {
                    FileSystem.root = null;
                    FileSystem.init(false);
                }
                ProcessManager.register('kernel', 'system');
                ProcessManager.register('window-manager', 'system');
                ProcessManager.register('filesystem-daemon', 'system');
                setupGlobalEvents();
                runBootSequence();
            }

            init();
            window.WebOS = {
                Kernel,
                FileSystem,
                ProcessManager,
                WindowManager,
                launchApp,
                showNotification
            };
        })();
    </script>
